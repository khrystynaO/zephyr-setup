# SPDX-License-Identifier: Apache-2.0

name: Setup Zephyr project
description: Setup a Zephyr base project using west and downloading the Zephyr SDK

inputs:

  zephyr-version:
    description: Zephyr version to use
    required: false
    default: main

  app-path:
    description: Application code path, should contain a west.yml file
    required: true

  manifest-file:
    description: manifest file for west init
    required: false

  sdk-version:
    description: Zephyr SDK version to use
    required: false
    default: 0.16.4

  sdk-base:
    description: Base URL of the Zephyr SDK
    required: false
    default: https://github.com/zephyrproject-rtos/sdk-ng/releases/download

  toolchains:
    description: List of toolchains to install, colon separated
    required: false
    default: arm-zephyr-eabi:riscv64-zephyr-elf

runs:
  using: "composite"
  steps:
    - name: Environment setup
      id: env-setup
      shell: bash
      run: |
        runner="${{ runner.os }}-${{ runner.arch }}"
        if [ "$runner" = "Linux-X64" ]; then
          sdk_variant="linux-x86_64"
        elif [ "$runner" = "Linux-ARM64" ]; then
          sdk_variant="linux-aarch64"
        elif [ "$runner" = "macOS-X64" ]; then
          sdk_variant="macos-x86_64"
        elif [ "$runner" = "macOS-ARM64" ]; then
          sdk_variant="macos-aarch64"
        elif [ "$runner" = "Windows-X64" ]; then
          sdk_variant="windows-x86_64"
        else
          echo "Unsupported runner platform: $runner"
        fi

        if [ "${{ runner.os }}" = "Linux" ]; then
          pip_cache_path="~/.cache/pip"
          sdk_ext="tar.xz"
          setup_file="./setup.sh"
          setup_opt="-"
        elif [ "${{ runner.os }}" = "macOS" ]; then
          pip_cache_path="~/Library/Caches/pip"
          sdk_ext="tar.xz"
          setup_file="./setup.sh"
          setup_opt="-"
        elif [ "${{ runner.os }}" = "Windows" ]; then
          pip_cache_path="~\AppData\Local\pip\Cache"
          sdk_ext="7z"
          setup_file="./setup.cmd"
          setup_opt="//"
        fi

        echo "SDK_FILE=zephyr-sdk-${{ inputs.sdk-version }}_${sdk_variant}_minimal.${sdk_ext}" >> $GITHUB_ENV
        echo "PIP_CACHE_PATH=${pip_cache_path}" >> $GITHUB_ENV
        echo "SETUP_FILE=${setup_file}" >> $GITHUB_ENV
        echo "SETUP_OPT=${setup_opt}" >> $GITHUB_ENV
        echo "WEST_MANIFEST_FILE=$(pwd)/${{ inputs.manifest-file }}" >> $GITHUB_ENV

    - name: Install dependencies
      shell: bash
      run: |
        pip3 install -U pip wheel
        pip3 install west
        if [ "${{ runner.os }}" = "Linux" ]; then
          sudo apt-get update
          sudo apt-get install ninja-build ccache
          if [ "${{ runner.arch }}" = "X64" ]; then
            sudo apt-get install libc6-dev-i386
          fi
        elif [ "${{ runner.os }}" = "macOS" ]; then
          brew install ninja ccache
        elif [ "${{ runner.os }}" = "Windows" ]; then
          choco feature enable -n allowGlobalConfirmation
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          choco install ninja wget 7zip
        fi

    - name: Cache Zephyr SDK
      id: cache-toolchain
      uses: actions/cache@v3
      with:
        path: zephyr-sdk
        key: ${{ env.SDK_FILE }}-${{ inputs.toolchains }}

    - if: ${{ steps.cache-toolchain.outputs.cache-hit != 'true' }}
      name: Download Zephyr SDK
      shell: bash
      run: |
        wget --progress=dot:giga ${{ inputs.sdk-base }}/v${{ inputs.sdk-version }}/$SDK_FILE
        if [ "${{ runner.os }}" = "Windows" ]; then
          7z x $SDK_FILE
          mv zephyr-sdk-${{ inputs.sdk-version }} zephyr-sdk
        else
          mkdir zephyr-sdk
          tar xvf $SDK_FILE -C zephyr-sdk --strip-components=1
        fi

    - name: Setup Zephyr SDK
      working-directory: zephyr-sdk
      shell: bash
      run: |
        IFS=":"
        TOOLCHAINS="${{ inputs.toolchains }}"
        for toolchain in $TOOLCHAINS; do
            ${SETUP_FILE} ${SETUP_OPT}t $toolchain
        done
        if [ ! -d sysroots ]; then
            ${SETUP_FILE} ${SETUP_OPT}h
        fi
        ${SETUP_FILE} ${SETUP_OPT}c

    - name: Initialize Zephyr
      shell: bash
      run: |
        if test -z "$WEST_MANIFEST_FILE"
        then
            mkdir zephyr_project && cd zephyr_project
            west init --mr ${{ inputs.zephyr-version }}
            # Full update for complete project setup
            west update
        else
            west init -l --mf $WEST_MANIFEST_FILE
            # Use shallow clone with sufficient depth for STM32/ARM builds, remove -n flag to ensure modules are fetched
            west update -o=--depth=20 1> west.update.log || west update -o=--depth=20 1> west.update-2.log || west update 1> west.update-3.log
        fi
        west zephyr-export

    - name: Cache Python packages
      uses: actions/cache@v3
      with:
        path: ${{ env.PIP_CACHE_PATH }}
        key: pip-${{ runner.os }}-${{ hashFiles('zephyr/scripts/requirements*.txt') }}

    - name: Install Python packages
      shell: bash
      run: |
        if test -z "$WEST_MANIFEST_FILE"
        then
            pip3 install -r zephyr_project/zephyr/scripts/requirements.txt
            echo "ZEPHYR_BASE=$(pwd)/zephyr_project/zephyr" >> $GITHUB_ENV
        else
            echo "dir $(pwd)"
            pip3 install -r ../zephyr/scripts/requirements.txt
            echo "ZEPHYR_BASE=$(pwd)/../zephyr" >> $GITHUB_ENV
        fi

    - name: Verify Zephyr setup
      shell: bash
      run: |
        echo "ZEPHYR_BASE: $ZEPHYR_BASE"
        echo "Checking for critical modules..."

        # Check if CMSIS module was properly fetched
        if [ -d "modules/hal/cmsis" ]; then
          echo "✓ CMSIS module found"
          echo "CMSIS directory structure:"
          find modules/hal/cmsis -type d | head -10
          echo "CMSIS header files:"
          find modules/hal/cmsis -name "*.h" | head -5

          # Look specifically for cmsis_core.h
          echo "Looking for cmsis_core.h:"
          find modules/hal/cmsis -name "*cmsis*" -name "*.h" || echo "No cmsis*.h files found"
          find modules/hal/cmsis -name "core_*.h" || echo "No core_*.h files found"

          # Check if there's a CMSIS directory with Core/Include
          if [ -d "modules/hal/cmsis/CMSIS/Core/Include" ]; then
            echo "✓ Found CMSIS/Core/Include directory"
            ls -la modules/hal/cmsis/CMSIS/Core/Include/
          else
            echo "✗ CMSIS/Core/Include directory not found"
            find modules/hal/cmsis -name "Include" -type d
          fi
        else
          echo "✗ CMSIS module missing"
          ls -la modules/hal/ 2>/dev/null || echo "modules/hal directory not found"
        fi

        # Check if STM32 HAL module was properly fetched
        if [ -d "modules/hal/stm32" ]; then
          echo "✓ STM32 HAL module found"
          echo "STM32 HAL structure:"
          ls -la modules/hal/stm32/ | head -10
        else
          echo "✗ STM32 HAL module missing"
        fi

        # Force a re-fetch of CMSIS if headers are missing
        echo "Checking if CMSIS needs manual fix..."
        if [ ! -f "modules/hal/cmsis/CMSIS/Core/Include/cmsis_compiler.h" ] && [ ! -f "modules/hal/cmsis/cmsis_core.h" ]; then
          echo "CMSIS headers seem incomplete, attempting to refresh..."
          cd modules/hal/cmsis
          git fetch --unshallow 2>/dev/null || echo "Already unshallow or fetch failed"
          git reset --hard HEAD
          cd ../../..

          # If still missing, check if we need to do a complete update without depth restriction
          if [ ! -f "modules/hal/cmsis/CMSIS/Core/Include/cmsis_compiler.h" ]; then
            echo "CMSIS still incomplete, forcing full module update..."
            west update --name-cache .west/name-cache modules/hal/cmsis || echo "Manual CMSIS update failed"
          fi
        fi

        # Final verification of critical files
        echo "Final CMSIS verification:"
        if [ -f "modules/hal/cmsis/CMSIS/Core/Include/cmsis_compiler.h" ]; then
          echo "✓ CMSIS headers properly available"
        elif [ -f "modules/hal/cmsis/cmsis_core.h" ]; then
          echo "✓ CMSIS core header found (alternative location)"
        else
          echo "✗ CMSIS headers still not found after all attempts"
          echo "Available files in CMSIS module:"
          find modules/hal/cmsis -name "*.h" | head -10 || echo "No header files found"
        fi

        # Set environment variables for subsequent steps
        echo "ZEPHYR_TOOLCHAIN_VARIANT=zephyr" >> $GITHUB_ENV
        if [ -d "zephyr-sdk" ]; then
          echo "ZEPHYR_SDK_INSTALL_DIR=$(pwd)/zephyr-sdk" >> $GITHUB_ENV
        fi

