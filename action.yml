# SPDX-License-Identifier: Apache-2.0

name: Simple Zephyr Setup
description: Simple and fast Zephyr project setup using official action

inputs:
  app-path:
    description: Application code path
    required: true
    default: '.'

  board:
    description: Target board (e.g., nrf52840dk_nrf52840, nucleo_f401re)
    required: true

  toolchains:
    description: Toolchains to install (colon separated)
    required: false
    default: 'arm-zephyr-eabi'

  sdk-version:
    description: Zephyr SDK version
    required: false
    default: '0.16.8'

  build-type:
    description: Build type (release, debug)
    required: false
    default: 'release'

outputs:
  firmware-hex:
    description: Path to the generated hex file
    value: ${{ steps.build.outputs.hex-path }}
  firmware-bin:
    description: Path to the generated bin file
    value: ${{ steps.build.outputs.bin-path }}

runs:
  using: composite
  steps:
    - name: Setup Zephyr
      uses: zephyrproject-rtos/action-zephyr-setup@v1
      with:
        app-path: ${{ inputs.app-path }}
        toolchains: ${{ inputs.toolchains }}
        sdk-version: ${{ inputs.sdk-version }}

    - name: Build firmware
      id: build
      shell: bash
      run: |
        # Configure build type
        if [ "${{ inputs.build-type }}" = "debug" ]; then
          BUILD_FLAGS="-DEXTRA_CONF_FILE=debug.conf"
        else
          BUILD_FLAGS=""
        fi

        # Build the firmware
        west build ${{ inputs.app-path }} -b ${{ inputs.board }} -p auto $BUILD_FLAGS

        # Set output paths
        HEX_PATH=""
        BIN_PATH=""

        if [ -f "build/zephyr/zephyr.hex" ]; then
          HEX_PATH="build/zephyr/zephyr.hex"
        fi

        if [ -f "build/zephyr/zephyr.bin" ]; then
          BIN_PATH="build/zephyr/zephyr.bin"
        fi

        echo "hex-path=$HEX_PATH" >> $GITHUB_OUTPUT
        echo "bin-path=$BIN_PATH" >> $GITHUB_OUTPUT

        # Print build summary
        echo "🎯 Build completed for ${{ inputs.board }}"
        if [ -f "build/zephyr/zephyr.elf" ]; then
          echo "📊 Memory usage:"
          size build/zephyr/zephyr.elf
        fi

